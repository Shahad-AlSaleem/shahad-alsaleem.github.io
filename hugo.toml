languageCode = "en-us"
title = "Shahad Al-Saleem // Security Writeups"
enableGitInfo = false
enableRobotsTXT = false

# a JSON search index on the home page
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  # My Accounts
  author      = "Shahad Al-Saleem"
  tagline     = "Information Security Specialist · Penetration Tester"
  description = "Penetration testing & security writeups — HTB, THM, CTF, web & bug bounty, plus certifications and notes."
  # Short skill badges shown on the home page. Edit freely.
  skills = ["Python", "Bash", "Burp Suite", "Nmap", "Metasploit", "Wireshark", "OWASP", "Qualys", "Tenable"]
  # Profile links shown on the home page and sidebar. Delete any you don't use.
  [params.profiles]
#    github      = "https://github.com/0xClk"
    htb         = "https://app.hackthebox.com/users/2477006"
#    thm         = "https://tryhackme.com/p/YOURUSER"
    linkedin    = "https://www.linkedin.com/in/shahad-al-saleem"
    twitter     = "https://x.com/0xClk"
    email       = "shahadalsaleem8@gmail.com"

[markup]
  [markup.highlight]
    style     = "github-dark"
    noClasses = true
    lineNos   = false
    tabWidth  = 2
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true           
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
    ordered    = false

# Top-level navigation order 
[[menu.main]]
  name   = "Home"
  url    = "/"
  weight = 1
