# ─────────────────────────────────────────────────────────────
#  Site config.  IMPORTANT: set baseURL to your GitHub Pages URL.
#  - Project page:  https://<user>.github.io/<repo>/   (keep trailing slash)
#  - User page:     https://<user>.github.io/
#  The deploy workflow overrides this automatically, so you can
#  leave it as "/" for local dev if you like.
#
# ─────────────────────────────────────────────────────────────
baseURL = "https://YOURUSER.github.io/YOURREPO/"
languageCode = "en-us"
title = "Shahad Al-Saleem // Security Writeups"
enableGitInfo = false
enableRobotsTXT = true

# Pretty URLs without ugly index.html, and a JSON search index on the home page
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  # Edit these — they show up in the sidebar footer and the home page.
  author      = "Shahad Al-Saleem"
  tagline     = "Information Security Specialist · Penetration Tester"
  description = "Penetration testing & security writeups — HTB, THM, CTF, web & bug bounty, plus certifications and notes."
  # Short skill badges shown on the home page. Edit freely.
  skills = ["Python", "Bash", "Burp Suite", "Nmap", "Metasploit", "Wireshark", "OWASP", "Qualys", "Tenable"]
  # Profile links shown on the home page and sidebar. Delete any you don't use.
  [params.profiles]
    github      = "https://github.com/Shahad-AlSaleem"
    htb         = "https://app.hackthebox.com/profile/000000"
    thm         = "https://tryhackme.com/p/YOURUSER"
    linkedin    = "https://www.linkedin.com/in/YOURUSER"
    twitter     = ""
    email       = ""

[markup]
  [markup.highlight]
    style     = "github-dark"
    noClasses = true
    lineNos   = false
    tabWidth  = 2
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true            # allow raw HTML in markdown (needed for some writeup formatting)
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
    ordered    = false

# Top-level navigation order (sections are auto-discovered from content/)
[[menu.main]]
  name   = "Home"
  url    = "/"
  weight = 1
