{{- $os := lower . -}}
{{- if in $os "win" -}}
<svg class="os-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><path fill="#4aa3ff" d="M0 2.6 6.5 1.7v5.9H0zM7.4 1.6 16 .4v7.2H7.4zM0 8.4h6.5v5.9L0 13.4zM7.4 8.4H16v7.2L7.4 14.3z"/></svg>
{{- else if in $os "lin" -}}
<svg class="os-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><circle cx="8" cy="8" r="7" fill="none" stroke="#f5b932" stroke-width="1.4"/><path d="M4.5 9.5 7 7l2.5 2.5M10 5.5h2" fill="none" stroke="#f5b932" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
{{- else -}}
<svg class="os-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
{{- end -}}
